<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YayJayBae 💛🃏</title>
    <style>
      /* import Poetsen One font */
      @import url("https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap");

      /* variables */
      :root {
        --pattern: #242734;
        --gold: #eab84b;
        --purple-dark: #2a0b5a;
        --purple-light: #c674f9;
        --blue-dark: #152a76;
        --blue-light: #3871e9;
        --collar-light: #ade2fe;
        --collar-dark: #366897;
        --eyeshadow-purple: #9748c8;
        --eyeshadow-blue: #3352a8;
      }

      /* base styles */
      html {
        background: var(--pattern);
        color: var(--gold);
        font-family: "Poetsen One";
      }

      /* hide scrollbar */
      body::-webkit-scrollbar {
        display: none;
      }

      /* body minimum height */
      body {
        min-height: 100vh;
      }

      /* page fade in */
      body {
        opacity: 0;
        animation: fadeIn 1s forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <h1>Hello!</h1>
    <p>I'm new! :3</p>
  </body>
</html>
