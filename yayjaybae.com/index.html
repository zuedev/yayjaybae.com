    <style>
      /* import Poetsen One font */
      @import url("https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap");

      /* variables */
      :root {
        --pattern: #242734;
        --gold: #eab84b;
        --purple-dark: #2a0b5a;
        --purple-light: #c674f9;
        --blue-dark: #152a76;
        --blue-light: #3871e9;
        --collar-light: #ade2fe;
        --collar-dark: #366897;
        --eyeshadow-purple: #9748c8;
        --eyeshadow-blue: #3352a8;
      }

      /* base styles */
      html {
        background-color: var(--pattern);
        color: var(--gold);
        font-family: "Poetsen One";
      }

      /* normalize body */
      body {
        margin: 0;
        padding: 0;
      }

      /* setup background pattern */
      html {
        background-image: url("assets/background.png");
        background-size: cover;
        background-position: center;
        background-repeat: repeat-y;
        background-attachment: fixed;
      }

      /* hide scrollbar */
      body::-webkit-scrollbar {
        display: none;
      }

      /* body minimum height */
      body {
        min-height: 100vh;
      }

      /* fade in animation */
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      /* header */
      header {
        position: relative;
        margin-bottom: 25vh; /* equal to 50vh hero image height + 25vh margin due to logo */
      }

      /* hero image */
      header #header-hero {
        height: 50vh;
        width: 100%;
        object-fit: cover;
        opacity: 0;
        animation: fadeIn 1s forwards;
        animation-delay: 2s;
      }

      @media (max-width: 800px) {
        header #header-hero {
          height: 35vh;
        }
      }

      /* logo image */
      header #header-logo {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, 0%);
        max-width: 750px;
        opacity: 0;
        animation: fadeIn 3s forwards;
      }

      @media (max-width: 800px) {
        header #header-logo {
          max-width: 90%;
        }
      }

      /* fade in animation for elements with initHiddenFadeIn class */
      .initHiddenFadeIn {
        opacity: 0;
        animation: fadeIn 1s forwards;
        animation-delay: 3s;
      }

      /* container */
      .contained {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* navigation */
      nav {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        z-index: 1000;
        max-height: 10vh;
      }

      nav #nav-logo {
        height: calc(
          10vh + 40px + 20px
        ); /* 10vh + padding + image white space */
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      /* reveal the nav logo once the hero image has scrolled out of view */
      nav #nav-logo.visible {
        opacity: 1;
      }

      /* style links */
      a {
        color: var(--collar-light);
        text-decoration: wavy underline;
      }
    </style>

    <script>
      // show the nav logo only after the hero image and header logo have scrolled out of view
      const navLogo = document.getElementById("nav-logo");
      const headerElements = [
        document.getElementById("header-hero"),
        document.getElementById("header-logo"),
      ];

      const visibleHeaderElements = new Set();
      const headerObserver = new IntersectionObserver(
        (entries) => {
          for (const entry of entries) {
            if (entry.isIntersecting) {
              visibleHeaderElements.add(entry.target);
            } else {
              visibleHeaderElements.delete(entry.target);
            }
          }
          navLogo.classList.toggle("visible", visibleHeaderElements.size === 0);
        },
        { threshold: 0 },
      );

      headerElements.forEach((element) => headerObserver.observe(element));
    </script>
    <script>
      // crossfades the about image every few seconds using a double-buffer
      const aboutImages = ["assets/about-1.png", "assets/about-2.png"];
      const imgA = document.getElementById("about-image-a");
      const imgB = document.getElementById("about-image-b");
      let currentIndex = 0;
      let aIsFront = true;

      setInterval(() => {
        currentIndex = (currentIndex + 1) % aboutImages.length;
        const front = aIsFront ? imgA : imgB;
        const back = aIsFront ? imgB : imgA;

        // preload next image in the back layer, then crossfade
        back.src = aboutImages[currentIndex];
        front.style.opacity = 0;
        back.style.opacity = 1;

        aIsFront = !aIsFront;
      }, 5000);
    </script>

    <!-- start of sparkles -->
    <div id="sparkle-container"></div>
    <style>
      /* The main overlay */
      #sparkle-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none; /* CRITICAL: Allows users to click through */
        z-index: -1;
        overflow: hidden;
      }

      /* Individual sparkle styling */
      .sparkle-particle {
        position: absolute;
        /* A vibrant base pink/red for the hue filter to rotate from */
        background-color: hsl(340, 100%, 65%);
        border-radius: 50%;
        /* A glowing aura that matches the base color */
        box-shadow: 0 0 6px 1px hsla(340, 100%, 65%, 0.8);
        opacity: 0;

        /* Applies both the twinkle size/opacity and the color shift */
        animation:
          twinkle var(--duration) ease-in-out infinite,
          rainbow var(--hue-speed) linear infinite;

        animation-delay: var(--delay), var(--hue-delay);
      }

      /* The glowing and sizing animation */
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0;
          transform: scale(0.5);
        }
        50% {
          opacity: 1;
          transform: scale(1.2);
        }
      }

      /* The rainbow color-shifting animation */
      @keyframes rainbow {
        0% {
          filter: hue-rotate(0deg);
        }
        100% {
          filter: hue-rotate(360deg);
        }
      }
    </style>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("sparkle-container");
        const particleCount = 150;

        for (let i = 0; i < particleCount; i++) {
          const sparkle = document.createElement("div");
          sparkle.classList.add("sparkle-particle");

          // Randomize position
          sparkle.style.left = `${Math.random() * 100}%`;
          sparkle.style.top = `${Math.random() * 100}%`;

          // Randomize size (between 1px and 3px)
          const size = Math.random() * 2 + 1;
          sparkle.style.width = `${size}px`;
          sparkle.style.height = `${size}px`;

          // Twinkle timing variables
          sparkle.style.setProperty("--duration", `${Math.random() * 3 + 2}s`);
          sparkle.style.setProperty("--delay", `${Math.random() * 5}s`);

          // Rainbow shift timing variables
          // hue-speed controls how fast the colors change (2s to 6s)
          sparkle.style.setProperty("--hue-speed", `${Math.random() * 4 + 2}s`);
          // A negative delay forces the animation to start partway through,
          // ensuring every sparkle spawns as a random color immediately.
          sparkle.style.setProperty("--hue-delay", `-${Math.random() * 10}s`);

          container.appendChild(sparkle);
        }
      });
    </script>
    <!-- end of sparkles -->

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        if (params.has("jester-debut-card")) {
          const modal = document.getElementById("jester-card-modal");
          modal.style.display = "flex";

          document
            .getElementById("jester-card-close")
            .addEventListener("click", function () {
              modal.style.display = "none";
              document.getElementById("jester-card-video").pause();
            });

          modal.addEventListener("click", function (e) {
            if (e.target === modal) {
              modal.style.display = "none";
              document.getElementById("jester-card-video").pause();
            }
          });
        }
      })();
    </script>
